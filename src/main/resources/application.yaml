# src/main/resources/application.yaml
# 在现有配置后添加以下内容

# 文件存储配置
file:
  storage:
    type: local  # local 或 remote
    local:
      path: D:/CloudFileSystem/files  # 本地存储路径
    remote:
      host: 192.168.1.100  # 远程服务器地址
      port: 22  # SSH 端口
      username: fileuser  # SSH 用户名
      password: your_password  # SSH 密码
      path: /data/files  # 远程存储路径