# Nginx配置文件 - CloudFileSystem生产环境
# 文件位置: /etc/nginx/sites-available/cloudfilesystem

# ==================== HTTP重定向到HTTPS ====================
server {
    listen 80;
    server_name api.yourdomain.com;  # 修改为您的域名

    # Let's Encrypt证书验证文件位置
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他所有请求重定向到HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ==================== HTTPS配置 ====================
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;  # 修改为您的域名

    # ==================== SSL证书配置 ====================
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # ==================== SSL优化配置 ====================
    # 只启用TLS 1.2和1.3
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # 使用安全的加密套件
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL会话缓存（提升性能）
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ==================== HSTS（强制HTTPS）====================
    # 有效期1年，包含子域名
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ==================== 安全头 ====================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==================== 日志配置 ====================
    access_log /var/log/nginx/cloudfilesystem-access.log;
    error_log /var/log/nginx/cloudfilesystem-error.log warn;

    # ==================== 反向代理配置 ====================
    location / {
        # 后端Spring Boot应用地址
        proxy_pass http://127.0.0.1:8835;

        # ==================== 传递真实客户端信息 ====================
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # ==================== WebSocket支持 ====================
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ==================== 超时配置 ====================
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ==================== 缓冲配置 ====================
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # ==================== 请求体大小限制 ====================
        client_max_body_size 100M;  # 根据实际需求调整
    }

    # ==================== 静态文件缓存（可选）====================
    # 如果有静态资源，可以配置缓存
    # location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
    #     proxy_pass http://127.0.0.1:8835;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ==================== 健康检查端点 ====================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ==================== API速率限制（可选）====================
    # 需要先在上层定义 limit_req_zone
    # location /api/ {
    #     limit_req zone=api burst=20 nodelay;
    #     proxy_pass http://127.0.0.1:8835;
    # }

    # ==================== 禁止访问隐藏文件 ====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ==================== 禁止访问备份文件 ====================
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ==================== 使用说明 ====================
#
# 1. 修改域名：
#    将所有 api.yourdomain.com 替换为您的实际域名
#
# 2. 创建符号链接：
#    sudo ln -s /etc/nginx/sites-available/cloudfilesystem /etc/nginx/sites-enabled/
#
# 3. 测试配置：
#    sudo nginx -t
#
# 4. 重启Nginx：
#    sudo systemctl restart nginx
#
# 5. 获取Let's Encrypt证书：
#    sudo certbot --nginx -d api.yourdomain.com
#
# 6. 设置自动续期：
#    sudo systemctl enable certbot-renew.timer
#
# ==================== 注意事项 ====================
#
# - 确保后端应用在 127.0.0.1:8835 运行
# - 确保防火墙开放80和443端口
# - 定期监控证书到期时间
# - 查看日志排查问题：
#   sudo tail -f /var/log/nginx/cloudfilesystem-access.log
#   sudo tail -f /var/log/nginx/cloudfilesystem-error.log
