# ==================== 证书信息查看 ====================
# 查看证书详情：
# keytool -list -v -keystore src/main/resources/ssl/keystore.p12 -storepass changeit

# ==================== 注意事项 ====================
# 1. 生产环境请使用正式的SSL证书（Let's Encrypt或商业证书）
# 2. 不要将证书密码硬编码在配置文件中，使用环境变量
# 3. 定期更新证书（Let's Encrypt证书有效期90天）
# 4. 备份证书文件和密码
# 5. 使用强密码保护私钥

# ==================== 环境变量方式（推荐）====================
# 使用环境变量代替硬编码密码
# server:
#   ssl:
#     key-store-password: ${SSL_KEYSTORE_PASSWORD}
#
# 启动时设置环境变量：
# export SSL_KEYSTORE_PASSWORD=your_secure_password
# java -jar app.jar
