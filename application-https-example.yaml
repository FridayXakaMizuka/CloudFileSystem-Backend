# HTTPS 配置示例
# 将此配置添加到 application.yaml 中

# ==================== 方案A：仅HTTPS（推荐生产环境）====================
server:
  address: 0.0.0.0
  port: 8835  # HTTPS端口
  ssl:
    enabled: true
    key-store: classpath:ssl/keystore.p12  # 证书文件路径
    key-store-password: changeit  # 证书密码（请修改为强密码）
    key-store-type: PKCS12
    key-alias: tomcat
    # 可选：启用TLS协议版本
    protocol: TLSv1.2,TLSv1.3
    # 可选：启用客户端认证（双向SSL）
    # client-auth: want  # none/want/require

# ==================== 方案B：同时支持HTTP和HTTPS ====================
# 如果需要同时支持HTTP和HTTPS，需要额外配置
# 在Java代码中添加Tomcat连接器（见 HttpsConfig.java）

# HTTP配置（通过Java代码配置）
# server.port=8835 (HTTPS)
# 额外添加HTTP连接器到8080端口

# ==================== 方案C：使用外部Web服务器（推荐）====================
# 如果使用Nginx/Apache作为反向代理，后端可以保持HTTP
# 在Nginx中配置SSL终止

# 后端保持HTTP配置
# server:
#   address: 0.0.0.0
#   port: 8835
#   # 不配置ssl部分

